# General
editor = "nvim"

# CLI behavior
interactive_default = true

# Bookmark settings
bookmark_location = "~/.bookmarks"  # Directory where bookmark files are stored (file extension based on shell)
navigation_tool = "z"               # Options: cd, z, zoxide, none
shell = "zsh"                       # Options: bash, zsh, fish, nu (auto-detected if not specified)

# Auto-alias generation
auto_alias_separator = ""   # Character between first letters (empty = "mcp", "-" = "m-c-p")
auto_alias_lowercase = true

# Display
home_icon = "~"  # Icon to represent home directory in list view (can be nerd font icon like "")
default_sort_by = "newest"  # Options: newest, oldest, a-z, z-a

# UI
list_spacing = "space" # Options: compact, tight, space

# Colors
headings = "15"
primary = "02"
secondary = "06"
text = "07"
text_highlight = "06"
description_highlight = "05"
tags = "13"
flags = "12"
muted = "08"
border = "08"
